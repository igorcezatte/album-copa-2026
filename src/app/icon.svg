<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#060a14"/>
  <rect x="48" y="48" width="416" height="416" rx="64" fill="#0d1424"/>
  <!-- Trophy -->
  <g transform="translate(256,256)">
    <!-- Cup body -->
    <path d="M-60,-80 L-60,40 Q-60,80 0,100 Q60,80 60,40 L60,-80 Z" fill="#C9A227" opacity="0.9"/>
    <!-- Cup handles -->
    <path d="M-60,-40 Q-100,-40 -100,-10 Q-100,20 -60,20" fill="none" stroke="#C9A227" stroke-width="12" stroke-linecap="round"/>
    <path d="M60,-40 Q100,-40 100,-10 Q100,20 60,20" fill="none" stroke="#C9A227" stroke-width="12" stroke-linecap="round"/>
    <!-- Base stem -->
    <rect x="-16" y="100" width="32" height="24" fill="#C9A227" opacity="0.9"/>
    <!-- Base -->
    <rect x="-48" y="120" width="96" height="16" rx="8" fill="#C9A227" opacity="0.9"/>
    <!-- Star on cup -->
    <text x="0" y="10" text-anchor="middle" font-size="40" fill="#060a14" font-weight="bold">26</text>
  </g>
</svg>
